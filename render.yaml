services:
  - type: web
    name: 1degree-estimator-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
